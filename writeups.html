<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eugene Vincent | Writeups</title>
  <meta name="description" content="FAANG-quality engineering deep-dives on Kubernetes, service mesh, serverless, GitOps, and PWA architecture — one writeup per project.">
  <meta name="keywords" content="writeups, project deep-dives, kubernetes, istio, devops, gitops, serverless, azure, pwa, cloud-native">
  <meta property="og:title" content="Eugene Vincent | Writeups">
  <meta property="og:description" content="FAANG-quality engineering deep-dives on Kubernetes, service mesh, serverless, GitOps, and PWA architecture — one writeup per project.">
  <meta property="og:image" content="/icons/icon-96.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --wp-bg: #0c0c14;
      --wp-card-bg: #12121e;
      --wp-card-border: rgba(188, 19, 254, 0.15);
      --wp-card-hover-border: rgba(0, 240, 252, 0.4);
      --wp-filter-bg: rgba(188, 19, 254, 0.08);
      --wp-filter-active: linear-gradient(135deg, rgba(188, 19, 254, 0.3), rgba(0, 240, 252, 0.15));
      --wp-modal-overlay: rgba(0, 0, 0, 0.7);
      --wp-text-muted: rgba(255, 255, 255, 0.4);
      --wp-tag-bg: rgba(0, 240, 252, 0.08);
      --wp-tag-border: rgba(0, 240, 252, 0.15);
      --wp-date-color: var(--text-secondary);
      --wp-read-time-color: var(--neon-cyan);
    }

    body.theme-retro {
      --wp-bg: #0f0d0a;
      --wp-card-bg: #1a1610;
      --wp-card-border: rgba(255, 140, 0, 0.15);
      --wp-card-hover-border: rgba(255, 170, 0, 0.4);
      --wp-filter-bg: rgba(255, 140, 0, 0.08);
      --wp-filter-active: linear-gradient(135deg, rgba(255, 140, 0, 0.3), rgba(255, 200, 0, 0.15));
      --wp-text-muted: rgba(232, 198, 122, 0.4);
      --wp-tag-bg: rgba(255, 170, 0, 0.08);
      --wp-tag-border: rgba(255, 170, 0, 0.15);
    }

    .wp-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .wp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.5rem 0 1rem;
      border-bottom: 1px solid rgba(188, 19, 254, 0.12);
      margin-bottom: 1.5rem;
    }

    .wp-header h2 {
      color: var(--neon-cyan);
      font-size: 1.1rem;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .wp-header h2 span {
      color: var(--text-secondary);
      font-weight: 400;
    }

    .wp-nav {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .wp-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.8rem;
      padding: 0.35rem 0.75rem;
      border: 1px solid rgba(188, 19, 254, 0.2);
      border-radius: 4px;
      transition: all 0.2s;
    }

    .wp-nav a:hover {
      color: var(--neon-cyan);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 10px rgba(0, 240, 252, 0.15);
    }

    .wp-controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      align-items: center;
    }

    .wp-filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .wp-filter-btn {
      background: var(--wp-filter-bg);
      border: 1px solid rgba(188, 19, 254, 0.2);
      color: var(--text-secondary);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    .wp-filter-btn:hover {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
    }

    .wp-filter-btn.active {
      background: var(--wp-filter-active);
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      box-shadow: 0 0 12px rgba(0, 240, 252, 0.15);
    }

    .wp-search {
      flex: 1;
      min-width: 200px;
      max-width: 340px;
      background: var(--wp-card-bg);
      border: 1px solid rgba(188, 19, 254, 0.15);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.25s;
    }

    .wp-search:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 12px rgba(0, 240, 252, 0.1);
    }

    .wp-search::placeholder {
      color: var(--wp-text-muted);
    }

    .wp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
      flex: 1;
    }

    .wp-card {
      background: var(--wp-card-bg);
      border: 1px solid var(--wp-card-border);
      border-left: 3px solid var(--neon-purple);
      border-radius: 8px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      animation: wp-card-in 0.4s ease-out both;
    }

    .wp-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(188, 19, 254, 0.03), transparent 60%);
      pointer-events: none;
    }

    @keyframes wp-card-in {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .wp-card:hover {
      border-color: var(--wp-card-hover-border);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(188, 19, 254, 0.08);
    }

    .wp-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }

    .wp-card-title {
      color: var(--neon-cyan);
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
      flex: 1;
      margin-right: 0.75rem;
    }

    .wp-card-category {
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      background: rgba(0, 240, 252, 0.1);
      color: var(--neon-cyan);
      border: 1px solid rgba(0, 240, 252, 0.2);
      white-space: nowrap;
    }

    .wp-card-excerpt {
      color: var(--text-secondary);
      font-size: 0.8rem;
      line-height: 1.6;
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .wp-card-tags {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .wp-card-tag {
      font-size: 0.6rem;
      padding: 0.15rem 0.5rem;
      border-radius: 8px;
      background: var(--wp-tag-bg);
      color: var(--neon-cyan);
      border: 1px solid var(--wp-tag-border);
    }

    .wp-card-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.7rem;
      color: var(--wp-date-color);
      border-top: 1px solid rgba(188, 19, 254, 0.08);
      padding-top: 0.6rem;
    }

    .wp-card-meta-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .wp-card-meta-item.read-time {
      color: var(--wp-read-time-color);
    }

    .wp-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
    }

    .wp-empty-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      opacity: 0.5;
    }

    /* Detail Modal */
    .wp-modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--wp-modal-overlay);
      backdrop-filter: blur(4px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: wp-modal-in 0.2s ease-out;
    }

    @keyframes wp-modal-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .wp-modal {
      background: var(--wp-card-bg);
      border: 1px solid rgba(188, 19, 254, 0.25);
      border-radius: 12px;
      max-width: 720px;
      width: 100%;
      max-height: 85vh;
      overflow: auto;
      padding: 2rem;
      position: relative;
      animation: wp-modal-content 0.25s ease-out;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
    }

    @keyframes wp-modal-content {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .wp-modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: 1px solid rgba(188, 19, 254, 0.2);
      color: var(--text-secondary);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .wp-modal-close:hover {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
    }

    .wp-modal-header {
      margin-bottom: 1rem;
      padding-right: 2rem;
    }

    .wp-modal-title {
      color: var(--neon-cyan);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .wp-modal-meta {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .wp-modal-meta span.read-time {
      color: var(--neon-cyan);
    }

    .wp-modal-body {
      color: var(--text-primary);
      font-size: 0.85rem;
      line-height: 1.8;
      margin-top: 1rem;
    }

    .wp-modal-body p {
      margin-bottom: 1rem;
    }

    .wp-modal-body strong {
      color: var(--neon-cyan);
    }

    .wp-modal-body ul, .wp-modal-body ol {
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }

    .wp-modal-body li {
      margin-bottom: 0.3rem;
    }

    .wp-modal-body code {
      background: rgba(188, 19, 254, 0.1);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.8rem;
      color: var(--neon-purple);
    }

    .wp-modal-tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(188, 19, 254, 0.1);
    }

    .wp-modal-tag {
      font-size: 0.7rem;
      padding: 0.25rem 0.6rem;
      border-radius: 12px;
      background: var(--wp-tag-bg);
      color: var(--neon-cyan);
      border: 1px solid var(--wp-tag-border);
    }

    @media (max-width: 768px) {
      .wp-wrapper { padding: 0 0.75rem 1rem; }
      .wp-header { flex-direction: column; align-items: flex-start; }
      .wp-search { max-width: 100%; }
      .wp-grid { grid-template-columns: 1fr; }
      .wp-modal { padding: 1.25rem; margin: 0.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .wp-card { animation: none; }
      .wp-modal, .wp-modal-overlay { animation: none; }
    }
  </style>
</head>
<body>
  <a href="#wp-grid" class="skip-link">Skip to writeups</a>
  <div id="crt-overlay"></div>
  <header class="terminal-header" role="banner">
    <h1 class="glitch" data-text="Eugene Vincent">Eugene Vincent</h1>
    <p class="subtitle">Full Stack Engineer | Azure DevOps | SRE</p>
  </header>
  <main class="terminal-container" style="flex:1;display:flex;flex-direction:column;">
    <div class="terminal-window" style="display:flex;flex-direction:column;flex:1;">
      <div class="terminal-titlebar">
        <span class="traffic-light red" aria-hidden="true"></span>
        <span class="traffic-light yellow" aria-hidden="true"></span>
        <span class="traffic-light green" aria-hidden="true"></span>
        <span class="title-text">eugene@homelab:~/writeups — Project Deep-Dives</span>
      </div>
      <div class="terminal-body" style="flex:1;display:flex;flex-direction:column;">
        <div class="wp-wrapper">
          <div class="wp-header">
            <h2>&#x1f4dd; <span>Project Deep-Dives</span></h2>
            <nav class="wp-nav">
              <a href="/">⌂ Terminal</a>
              <a href="/project-explorer">📂 Projects</a>
              <a href="/dashboard">📊 Dashboard</a>
              <a href="/contact">✉ Contact</a>
            </nav>
          </div>

          <div class="wp-controls">
            <div class="wp-filters" id="wp-filters">
              <button class="wp-filter-btn active" data-filter="">All</button>
              <button class="wp-filter-btn" data-filter="kubernetes">☁️ Kubernetes</button>
              <button class="wp-filter-btn" data-filter="devops">⚙️ DevOps</button>
              <button class="wp-filter-btn" data-filter="cloud">💰 Cloud</button>
            </div>
            <input type="text" class="wp-search" id="wp-search" placeholder="Search articles..." autocomplete="off">
          </div>

          <div class="wp-grid" id="wp-grid" role="list" aria-label="Project deep-dive writeups"></div>
        </div>
      </div>
    </div>
  </main>
  <footer class="terminal-footer" role="contentinfo">
    <div class="footer-left">
      <p>← Back to <a href="/" style="color:var(--neon-cyan);">Terminal</a></p>
    </div>
    <div class="footer-right">
      <button class="ct-hamburger" id="mobile-menu-btn" aria-label="Toggle navigation menu" aria-expanded="false">&#x2630;</button>
      <nav class="mobile-nav" id="mobile-nav">
        <a href="/project-explorer" class="demo-btn" style="text-decoration:none;" aria-label="Project Explorer">📂 Projects</a>
        <a href="/dashboard" class="demo-btn" style="text-decoration:none;" aria-label="Live Dashboard">📊 Dashboard</a>
        <a href="/writeups" class="demo-btn" style="text-decoration:none;" aria-label="Writeups">✎ Writeups</a>
        <a href="/contact" class="demo-btn" style="text-decoration:none;" aria-label="Contact">✉ Contact</a>
      </nav>
      <span id="online-status" class="status-indicator" aria-live="polite" aria-label="Network status"></span>
    </div>
  </footer>

  <script type="module">
    import { initMobileNav } from '/js/mobile-nav.js';
    import { escapeHtml } from '/js/utils/helpers.js';
    import { WRITEUPS } from '/js/writeups-data.js';

    initMobileNav();

    const grid = document.getElementById('wp-grid');
    const searchInput = document.getElementById('wp-search');
    const filterBtns = document.querySelectorAll('.wp-filter-btn');

    let activeFilter = '';
    let activeQuery = '';

    // Sanitize HTML for writeup content - only allows safe tags
    function sanitizeHtml(html) {
      if (!html) return '';
      const allowedTags = ['p','strong','em','ul','ol','li','code','br','h1','h2','h3','h4','blockquote'];
      const allowedAttr = ['class'];
      let result = html;
      // Strip all tags not in the allowed list
      result = result.replace(/<[^>]*>/g, (tag) => {
        const tagName = tag.match(/^<\s*([a-zA-Z]+)/)?.[1]?.toLowerCase();
        if (!tagName || !allowedTags.includes(tagName)) return '';
        return tag;
      });
      return result;
    }

    function renderWriteups() {
      const filtered = WRITEUPS.filter(w => {
        const matchFilter = !activeFilter || w.category === activeFilter || w.tags.includes(activeFilter);
        const matchQuery = !activeQuery ||
          w.title.toLowerCase().includes(activeQuery) ||
          w.excerpt.toLowerCase().includes(activeQuery) ||
          w.tags.some(t => t.includes(activeQuery));
        return matchFilter && matchQuery;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="wp-empty">
            <div class="wp-empty-icon">&#x1f50d;</div>
            <p>No articles match your search. Try a different filter or keyword.</p>
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map((w, i) => `
        <div class="wp-card" data-index="${i}" tabindex="0" role="button" aria-label="Read article: ${escapeHtml(w.title)}">
          <div class="wp-card-top">
            <span class="wp-card-title">${escapeHtml(w.title)}</span>
            <span class="wp-card-category">${escapeHtml(w.category.toUpperCase())}</span>
          </div>
          <div class="wp-card-excerpt">${escapeHtml(w.excerpt)}</div>
          <div class="wp-card-tags">
            ${w.tags.map(t => `<span class="wp-card-tag">${escapeHtml(t)}</span>`).join('')}
          </div>
          <div class="wp-card-meta">
            <span class="wp-card-meta-item">&#x1f4c6; ${escapeHtml(w.date)}</span>
            <span class="wp-card-meta-item read-time">&#x1f56c; ${escapeHtml(w.readTime)}</span>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.wp-card').forEach(card => {
        card.addEventListener('click', () => {
          const idx = parseInt(card.dataset.index);
          openModal(WRITEUPS[idx]);
        });
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            card.click();
          }
        });
      });
    }

    function openModal(article) {
      const overlay = document.createElement('div');
      overlay.className = 'wp-modal-overlay';

      overlay.innerHTML = `
        <div class="wp-modal" role="dialog" aria-label="${escapeHtml(article.title)}">
          <button class="wp-modal-close" aria-label="Close article">&times;</button>
          <div class="wp-modal-header">
            <div class="wp-modal-title">${escapeHtml(article.title)}</div>
            <div class="wp-modal-meta">
              <span>&#x1f4c6; ${escapeHtml(article.date)}</span>
              <span class="read-time">&#x1f56c; ${escapeHtml(article.readTime)}</span>
            </div>
          </div>
          <div class="wp-modal-body">${sanitizeHtml(article.content)}</div>
          <div class="wp-modal-tags">
            ${article.tags.map(t => `<span class="wp-modal-tag">${escapeHtml(t)}</span>`).join('')}
          </div>
        </div>
      `;

      document.body.appendChild(overlay);

      overlay.querySelector('.wp-modal-close').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.body.contains(overlay)) {
          overlay.remove();
        }
      }, { once: true });
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderWriteups();
      });
    });

    searchInput.addEventListener('input', () => {
      activeQuery = searchInput.value.toLowerCase().trim();
      renderWriteups();
    });

    // Online status handled by pwa.js globally

    // Theme persistence
    if (localStorage.getItem('portfolio-theme') === 'retro') {
      document.body.classList.add('theme-retro');
    }

    renderWriteups();
  </script>
</body>
</html>
