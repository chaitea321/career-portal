<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Portfolio - Offline</title>
  <style>
    body { margin:0; padding:2rem; min-height:100vh; background:#0a0a0f; color:#e0e0e0; font-family:'JetBrains Mono',monospace; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; overflow-x:hidden; }
    .offline-icon { font-size:4rem; margin-bottom:1rem; animation: pulse 2s infinite; }
    h1 { color:#ff69b8; font-size:1.5rem; margin:0 0 0.5rem; }
    p { color:#aaa; max-width:400px; line-height:1.6; }
    .btn { display:inline-block; margin-top:1.5rem; padding:0.75rem 1.5rem; background:linear-gradient(135deg,#ff69b8,#a855d4); color:#fff; border:none; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:1rem; cursor:pointer; text-decoration:none; transition:transform 0.2s; }
    .btn:hover { transform:scale(1.05); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-bar { position:fixed; top:0; left:0; right:0; height:3px; background:#ff69b8; animation:bar-move 3s linear infinite; }
    @keyframes bar-move { 0%{width:0;background:#ff69b8} 50%{background:#a855d4} 100%{width:100%;background:#00f0ff} }
  </style>
</head>
<body>
  <div class="status-bar"></div>
  <div class="offline-icon">&#x26A0;</div>
  <h1>Terminal Offline</h1>
  <p>Your internet connection is down. The cached version of the portfolio terminal may still work — click below to try reloading.</p>
  <a href="/" class="btn" id="retryBtn">&#x1f504; Retry Connection</a>
  <script>
    document.getElementById('retryBtn').addEventListener('click', function(e) {
      e.preventDefault();
      if (navigator.onLine) {
        location.reload();
      } else {
        this.textContent = '&#x274C; Still offline — check your connection';
        this.style.background = '#666';
        setTimeout(function() { location.reload(); }, 3000);
      }
    });
    // Auto-retry every 30 seconds when online
    setInterval(function() { if (navigator.onLine) location.reload(); }, 30000);
    window.addEventListener('online', function() { location.reload(); });
  </script>
</body>
</html>
